model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[features]
multi_agent = true
shell_snapshot = true
